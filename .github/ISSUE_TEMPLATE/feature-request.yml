name: Feature Request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this feature solve?
      placeholder: "I need to transcode uploaded videos before storing them..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Code examples are welcome.
      placeholder: |
        ```typescript
        s3.video()
          .transcode({ format: "mp4", quality: 0.8 })
          .middleware(async () => ({}))
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.
