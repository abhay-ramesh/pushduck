name: Bug Report
description: Something isn't working as expected
title: "bug: "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected vs what actually happened.
      placeholder: |
        When I upload a file with acl: "public-read", the file is stored as private instead.

        Expected: File should be publicly readable.
        Actual: File requires authentication to access.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```typescript
        const { s3 } = createUploadConfig()
          .provider("aws", { ... })
          .defaults({ acl: "public-read" })
          .build();
        ```
      render: typescript
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of: npm list pushduck"
      placeholder: "0.5.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Framework, provider, Node version, or anything else relevant.
      placeholder: "Next.js 15, AWS S3, Node 22"

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste any relevant error output.
      render: shell
